# Nginx配置 - BOM API反向代理
# 将此文件复制到: /etc/nginx/sites-available/bom-api.conf
# 创建软链接: ln -s /etc/nginx/sites-available/bom-api.conf /etc/nginx/sites-enabled/
# 重启Nginx: systemctl restart nginx

upstream bom_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name bom-api.company.com;  # 修改为实际域名
    
    # 访问日志
    access_log /var/log/nginx/bom_api_access.log;
    error_log /var/log/nginx/bom_api_error.log;
    
    # 客户端最大上传大小（用于上传Excel文件）
    client_max_body_size 50M;
    
    # API路由
    location /api/ {
        proxy_pass http://bom_api;
        proxy_http_version 1.1;
        
        # 代理头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时设置
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        
        # 缓冲设置
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    # 静态文件（报告下载）
    location /reports/ {
        alias /opt/bom_check/reports/;
        autoindex off;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # 健康检查
    location /health {
        proxy_pass http://bom_api/api/health;
        access_log off;
    }
    
    # 首页重定向到API文档
    location = / {
        return 301 /api/;
    }
}

