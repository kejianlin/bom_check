version: '3.8'

services:
  # MySQL数据库（PLM同步库）
  mysql:
    image: mysql:8.0
    container_name: plm_sync_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${SYNC_DB_NAME}
      MYSQL_USER: ${SYNC_DB_USER}
      MYSQL_PASSWORD: ${SYNC_DB_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ./mysql/init:/docker-entrypoint-initdb.d
      - ./backup:/backup
    networks:
      - bom_network
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=1G
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
  
  # BOM校验API服务
  bom_api:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: bom_validator_api
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - PLM_DB_TYPE=${PLM_DB_TYPE}
      - PLM_DB_HOST=${PLM_DB_HOST}
      - PLM_DB_PORT=${PLM_DB_PORT}
      - PLM_DB_NAME=${PLM_DB_NAME}
      - PLM_DB_USER=${PLM_DB_USER}
      - PLM_DB_PASSWORD=${PLM_DB_PASSWORD}
      - SYNC_DB_TYPE=mysql
      - SYNC_DB_HOST=mysql
      - SYNC_DB_PORT=3306
      - SYNC_DB_NAME=${SYNC_DB_NAME}
      - SYNC_DB_USER=${SYNC_DB_USER}
      - SYNC_DB_PASSWORD=${SYNC_DB_PASSWORD}
      - API_HOST=0.0.0.0
      - API_PORT=5000
      - LOG_LEVEL=INFO
    ports:
      - "5000:5000"
    volumes:
      - ../../config:/app/config
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./temp:/app/temp
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bom_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  
  # PLM数据同步服务（定时任务）
  bom_sync:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: bom_sync_scheduler
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - PLM_DB_TYPE=${PLM_DB_TYPE}
      - PLM_DB_HOST=${PLM_DB_HOST}
      - PLM_DB_PORT=${PLM_DB_PORT}
      - PLM_DB_NAME=${PLM_DB_NAME}
      - PLM_DB_USER=${PLM_DB_USER}
      - PLM_DB_PASSWORD=${PLM_DB_PASSWORD}
      - SYNC_DB_TYPE=mysql
      - SYNC_DB_HOST=mysql
      - SYNC_DB_PORT=3306
      - SYNC_DB_NAME=${SYNC_DB_NAME}
      - SYNC_DB_USER=${SYNC_DB_USER}
      - SYNC_DB_PASSWORD=${SYNC_DB_PASSWORD}
    volumes:
      - ../../config:/app/config
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bom_network
    command: >
      sh -c "
        echo 'PLM数据同步调度器启动...' &&
        while true; do
          echo '执行增量同步: '$(date) &&
          python /app/sync/plm_sync.py --mode incremental &&
          echo '同步完成，等待下次执行...' &&
          sleep 86400
        done
      "
  
  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: bom_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/bom-api.conf:/etc/nginx/conf.d/default.conf
      - ./logs/nginx:/var/log/nginx
      - ./reports:/usr/share/nginx/html/reports:ro
    depends_on:
      - bom_api
    networks:
      - bom_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
    driver: local

networks:
  bom_network:
    driver: bridge
