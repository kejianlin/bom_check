name: Deploy to Server

on:
  push:
    branches:
      - master  # 或者你的主分支名称

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Check loaded SSH keys
      run: ssh-add -l

    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        echo "SERVER_HOST: ${{ secrets.SERVER_HOST }}"
        echo "SERVER_USER: ${{ secrets.SERVER_USER }}"
        if [ -z "${{ secrets.SERVER_HOST }}" ]; then
          echo "Error: SERVER_HOST secret is not set"
          exit 1
        fi
        # 提取主机和端口
        if [[ "${{ secrets.SERVER_HOST }}" == *":"* ]]; then
          HOST=$(echo "${{ secrets.SERVER_HOST }}" | cut -d: -f1)
          PORT=$(echo "${{ secrets.SERVER_HOST }}" | cut -d: -f2)
        else
          HOST="${{ secrets.SERVER_HOST }}"
          PORT="22"
        fi
        echo "Scanning host: $HOST on port: $PORT"
        ssh-keyscan -p $PORT -H $HOST >> ~/.ssh/known_hosts || {
          echo "Failed to scan host $HOST on port $PORT"
          exit 1
        }

    - name: Deploy to server
      run: |
        # 提取主机和端口
        if [[ "${{ secrets.SERVER_HOST }}" == *":"* ]]; then
          HOST=$(echo "${{ secrets.SERVER_HOST }}" | cut -d: -f1)
          PORT=$(echo "${{ secrets.SERVER_HOST }}" | cut -d: -f2)
          SSH_CMD="ssh -o BatchMode=yes -o IdentitiesOnly=yes -p $PORT ${{ secrets.SERVER_USER }}@$HOST"
        else
          SSH_CMD="ssh -o BatchMode=yes -o IdentitiesOnly=yes ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}"
        fi
        echo "Using SSH command: $SSH_CMD"
        $SSH_CMD << 'EOF'
          cd /opt/bom_check
          git pull --ff-only origin master
          sudo bash deploy/scripts/deploy_update.sh
        EOF
