<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOM文件上传校验系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .template-section {
            margin-bottom: 30px;
        }

        .template-section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            color: white;
        }

        .btn-primary {
            background: #667eea;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
        }

        .btn-secondary:hover {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .upload-section {
            margin-top: 30px;
        }

        .upload-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background: #f8f9fa;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            background: #e9ecef;
            border-color: #5568d3;
        }

        .upload-area.dragover {
            background: #e7eaf6;
            border-color: #5568d3;
        }

        .upload-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .file-info {
            margin-top: 20px;
            padding: 15px;
            background: #e7f5ff;
            border-radius: 8px;
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            font-weight: bold;
            color: #1971c2;
            margin-bottom: 5px;
        }

        .file-size {
            color: #666;
            font-size: 0.9em;
        }

        .btn-validate {
            width: 100%;
            padding: 15px;
            background: #48bb78;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-validate:hover:not(:disabled) {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(72, 187, 120, 0.4);
        }

        .btn-validate:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result-section {
            margin-top: 30px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .result-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-icon {
            font-size: 2em;
        }

        .status-icon.success {
            color: #48bb78;
        }

        .status-icon.error {
            color: #e74c3c;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        .error-list {
            background: #fff5f5;
            border-left: 4px solid #e74c3c;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .error-item {
            padding: 10px;
            border-bottom: 1px solid #fee;
            font-size: 0.9em;
        }

        .error-item:last-child {
            border-bottom: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 BOM文件上传校验系统</h1>
            <p>支持Excel格式文件上传和自动校验</p>
        </div>

        <div class="card">
            <div class="template-section">
                <h2>📋 模板下载</h2>
                <div class="btn-group">
                    <a href="/api/template/empty" class="btn btn-primary" download>下载空白模板</a>
                    <a href="/api/template/sample" class="btn btn-secondary" download>下载示例模板</a>
                </div>
            </div>

            <div class="upload-section">
                <h2>📤 上传文件</h2>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">点击或拖拽文件到此处上传</div>
                    <div class="upload-hint">支持 .xlsx 和 .xls 格式</div>
                    <input type="file" id="fileInput" accept=".xlsx,.xls">
                </div>

                <div class="file-info" id="fileInfo">
                    <div class="file-name" id="fileName"></div>
                    <div class="file-size" id="fileSize"></div>
                </div>

                <button class="btn-validate" id="validateBtn" disabled>开始校验</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <div>正在校验中，请稍候...</div>
            </div>

            <div class="result-section" id="resultSection">
                <h2>📈 校验结果</h2>
                <div class="result-header">
                    <div class="result-status">
                        <span class="status-icon" id="statusIcon"></span>
                        <h3 id="statusText"></h3>
                    </div>
                </div>

                <div class="result-stats">
                    <div class="stat-card">
                        <div class="stat-value" id="totalRows">0</div>
                        <div class="stat-label">总行数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="validRows">0</div>
                        <div class="stat-label">有效行数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #e74c3c;" id="errorCount">0</div>
                        <div class="stat-label">错误数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #f39c12;" id="warningCount">0</div>
                        <div class="stat-label">警告数</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" style="color: #48bb78;" id="passRate">0%</div>
                        <div class="stat-label">通过率</div>
                    </div>
                </div>

                <div class="btn-group">
                    <a href="#" class="btn btn-primary" id="downloadHtml" download>下载HTML报告</a>
                    <a href="#" class="btn btn-secondary" id="downloadExcel" download>下载Excel报告</a>
                </div>

                <div class="error-list" id="errorList" style="display: none;">
                    <h3>错误详情</h3>
                    <div id="errorItems"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const validateBtn = document.getElementById('validateBtn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');

        let selectedFile = null;

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.name.match(/\.(xlsx|xls)$/i)) {
                alert('请上传 .xlsx 或 .xls 格式的文件');
                return;
            }

            selectedFile = file;
            fileName.textContent = `文件名: ${file.name}`;
            fileSize.textContent = `大小: ${(file.size / 1024).toFixed(2)} KB`;
            fileInfo.classList.add('show');
            validateBtn.disabled = false;
        }

        validateBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('bom_file', selectedFile);
            formData.append('format', 'both');

            loading.classList.add('show');
            resultSection.classList.remove('show');
            validateBtn.disabled = true;

            try {
                const response = await fetch('/api/validate', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    displayResult(result);
                } else {
                    alert(`校验失败: ${result.error}`);
                }
            } catch (error) {
                alert(`请求失败: ${error.message}`);
            } finally {
                loading.classList.remove('show');
                validateBtn.disabled = false;
            }
        });

        function displayResult(result) {
            const statusIcon = document.getElementById('statusIcon');
            const statusText = document.getElementById('statusText');

            if (result.is_valid) {
                statusIcon.textContent = '✅';
                statusIcon.className = 'status-icon success';
                statusText.textContent = '校验通过';
            } else {
                statusIcon.textContent = '❌';
                statusIcon.className = 'status-icon error';
                statusText.textContent = '校验失败';
            }

            document.getElementById('totalRows').textContent = result.total_rows;
            document.getElementById('validRows').textContent = result.valid_rows;
            document.getElementById('errorCount').textContent = result.error_count;
            document.getElementById('warningCount').textContent = result.warning_count;
            document.getElementById('passRate').textContent = result.pass_rate + '%';

            if (result.report_urls.html) {
                document.getElementById('downloadHtml').href = result.report_urls.html;
            }
            if (result.report_urls.excel) {
                document.getElementById('downloadExcel').href = result.report_urls.excel;
            }

            if (result.error_count > 0) {
                const errorList = document.getElementById('errorList');
                const errorItems = document.getElementById('errorItems');
                errorItems.innerHTML = '';

                Object.entries(result.error_summary).forEach(([rule, count]) => {
                    const item = document.createElement('div');
                    item.className = 'error-item';
                    item.textContent = `${rule}: ${count} 个错误`;
                    errorItems.appendChild(item);
                });

                errorList.style.display = 'block';
            }

            resultSection.classList.add('show');
        }
    </script>
</body>
</html>
